name: Build and Auto-Update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assembleDebug

      - name: Get Version Code
        id: version_info
        run: |
          VERSION=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version_info.outputs.VERSION }}
          name: App Update v${{ steps.version_info.outputs.VERSION }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Firebase
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version_info.outputs.VERSION }}/app-debug.apk"
          VERSION=${{ steps.version_info.outputs.VERSION }}
          
          # Using Firebase CLI (installed by default in GitHub Actions)
          # We update the Realtime Database which the app will listen to
          npm install -g firebase-tools
          firebase database:set /app_update "{\"latest_version\": $VERSION, \"apk_url\": \"$APK_URL\"}" --project aero5-886bf --token "${{ secrets.FIREBASE_TOKEN }}" --confirm
