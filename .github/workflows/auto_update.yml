name: Build and Auto-Update

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assembleDebug

      - name: Get Version Code
        id: version_info
        run: |
          VERSION=$(grep "versionCode" app/build.gradle | head -n 1 | awk '{print $2}' | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version_info.outputs.VERSION }}
          name: App Update v${{ steps.version_info.outputs.VERSION }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Firebase
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version_info.outputs.VERSION }}/app-debug.apk"
          VERSION=${{ steps.version_info.outputs.VERSION }}
          
          # Create a temporary JSON file to avoid shell escaping issues
          echo "{\"latest_version\": $VERSION, \"apk_url\": \"$APK_URL\"}" > update.json
          
          # Use npx to run the latest firebase-tools and explicitly set the project and instance
          npx firebase-tools database:set /app_update update.json --project aero5-886bf --instance aero5-886bf-default-rtdb --token "${{ secrets.FIREBASE_TOKEN }}" --force
